<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Contacto - CaveroSalud</title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="/public/css/site.css" rel="stylesheet">
  <link rel="icon" href="/public/img/favicon.svg" type="image/svg+xml">
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm">
    <div class="container">
      <a class="navbar-brand d-flex align-items-center fw-bold" href="/public/index.html">
        <img src="/public/img/logo.png" alt="CaveroSalud" class="navbar-logo me-2" width="34" height="34" />
        CaveroSalud Digital
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu" aria-controls="navMenu" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navMenu">
        <ul class="navbar-nav ms-auto mb-2 mb-lg-0 align-items-lg-center">
          <li class="nav-item"><a class="nav-link" href="/public/about.html">Nosotros</a></li>
          <li class="nav-item"><a class="nav-link" href="/public/services.html">Servicios</a></li>
          <li class="nav-item"><a class="nav-link" href="/public/specialties.html">Especialidades</a></li>
          <li class="nav-item"><a class="nav-link active" href="/public/contact.html">Contacto</a></li>
          <li class="nav-item d-flex gap-2 mt-3 mt-lg-0">
            <a class="btn btn-outline-primary btn-sm" href="/login">Iniciar sesión</a>
            <a class="btn btn-primary btn-sm" href="/register">Registro</a>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <main class="py-5">
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-lg-8">
          <div class="card shadow-sm">
            <div class="card-body">
              <h1 class="mb-3">Contacto</h1>
              <form id="contactForm">
                <div class="mb-3">
                  <label class="form-label">Nombre</label>
                  <input class="form-control" type="text" id="name" required />
                </div>
                <div class="mb-3">
                  <label class="form-label">Correo</label>
                  <input class="form-control" type="email" id="email" required />
                </div>
                <div class="mb-3">
                  <label class="form-label">Teléfono</label>
                  <input class="form-control" type="text" id="phone" />
                </div>
                <div class="mb-3">
                  <label class="form-label">Mensaje</label>
                  <textarea class="form-control" id="message" rows="6" required></textarea>
                </div>
                <div class="d-flex justify-content-between align-items-center">
                  <div id="status" class="text-success"></div>
                  <button class="btn btn-primary" type="submit">Enviar</button>
                </div>
              </form>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script>
    document.getElementById('contactForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const payload = {
        name: document.getElementById('name').value,
        email: document.getElementById('email').value,
        phone: document.getElementById('phone').value,
        message: document.getElementById('message').value
      };

      try {
        const res = await fetch('/api/v1/public/contact', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        const statusEl = document.getElementById('status');
        if (res.ok) {
          statusEl.className = 'text-success';
          statusEl.innerText = 'Mensaje enviado. Gracias.';
          document.getElementById('contactForm').reset();
        } else {
          statusEl.className = 'text-danger';
          statusEl.innerText = 'Error al enviar mensaje.';
        }
      } catch (err) {
        const statusEl = document.getElementById('status');
        statusEl.className = 'text-danger';
        statusEl.innerText = 'Error de red.';
      }
    });
  </script>

  <footer class="bg-white border-top py-4">
    <div class="container text-center text-muted">&copy; 2026 CaveroSalud Digital</div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
