<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Iniciar sesión - CaveroSalud</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/public/css/site.css" rel="stylesheet">
    <link rel="icon" href="/public/img/favicon.svg" type="image/svg+xml">
  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm">
      <div class="container">
        <a class="navbar-brand d-flex align-items-center fw-bold" href="/public/index.html">
          <img src="/public/img/logo.png" alt="CaveroSalud" class="navbar-logo me-2" width="34" height="34" />
          CaveroSalud Digital
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu" aria-controls="navMenu" aria-expanded="false" aria-label="Toggle navigation">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navMenu">
          <ul class="navbar-nav ms-auto mb-2 mb-lg-0 align-items-lg-center">
            <li class="nav-item"><a class="nav-link" href="/public/about.html">Nosotros</a></li>
            <li class="nav-item"><a class="nav-link" href="/public/services.html">Servicios</a></li>
            <li class="nav-item"><a class="nav-link" href="/public/specialties.html">Especialidades</a></li>
            <li class="nav-item"><a class="nav-link" href="/public/contact.html">Contacto</a></li>
          </ul>
        </div>
      </div>
    </nav>

    <main class="py-5">
      <div class="container">
        <div class="row justify-content-center">
          <div class="col-lg-6">
            <div class="card shadow-sm rounded-4">
              <div class="card-body p-5">
                <h1 class="h3 mb-4">Iniciar sesión</h1>
                <p class="text-muted">Accede a tu cuenta para agendar citas y revisar tu atención médica.</p>
                <form id="loginForm">
                  <div class="mb-3">
                    <label class="form-label" for="email">Correo electrónico</label>
                    <input class="form-control" type="email" id="email" required />
                  </div>
                  <div class="mb-4">
                    <label class="form-label" for="password">Contraseña</label>
                    <input class="form-control" type="password" id="password" required />
                  </div>
                  <button type="submit" class="btn btn-primary w-100">Ingresar</button>
                  <div id="loginStatus" class="text-danger small mt-3"></div>
                </form>
                <div class="text-center mt-4">
                  <span class="text-muted">¿No tienes cuenta?</span>
                  <a href="/register">Regístrate</a>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>

    <footer class="bg-white border-top py-4">
      <div class="container text-center text-muted">&copy; 2026 CaveroSalud Digital</div>
    </footer>

    <script>
      document.getElementById('loginForm').addEventListener('submit', async function (e) {
        e.preventDefault();
        const status = document.getElementById('loginStatus');
        status.textContent = '';

        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;

        try {
          const response = await fetch('/api/v1/auth/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, password })
          });

          if (!response.ok) {
            status.textContent = 'Correo o contraseña incorrectos.';
            return;
          }

          const result = await response.json();
          window.location.href = result.redirect ?? '/';
        } catch (error) {
          status.textContent = 'Error al iniciar sesión. Intenta de nuevo.';
          console.error(error);
        }
      });
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
