services:
  - type: web
    name: clinica-cavero-api
    runtime: docker
    plan: free
    region: virginia
    dockerCommand: "dotnet CaveroSalud.Api.dll"
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: ASPNETCORE_URLS
        value: http://0.0.0.0:$PORT
      - key: ConnectionStrings__DefaultConnection
        fromDatabase:
          name: caverosaludbd
          property: connectionString
      - key: ConnectionStrings__Default
        fromDatabase:
          name: caverosaludbd
          property: connectionString
      - key: Admin__Email
        value: admin@cavero.local
      - key: Admin__Password
        value: Admin123!

  - type: pserv
    name: clinica-cavero-db
    plan: free
    region: virginia
    databaseName: caverosaludbd
    user: postgres

# Render no necesita un bloque databases cuando usas pserv; mantengo el nombre para compatibilidad con el servicio anterior.
databases:
  - name: caverosaludbd
    databaseName: caverosaludbd
    user: postgres
    plan: free
    region: virginia
